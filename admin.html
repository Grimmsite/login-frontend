<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Reversal Submissions</title>
<style>
  :root{
    --brand:#FF444F;
    --bg:#F5F5F5;
    --field-bg:#FFFFFF;
    --text-primary:#333333;
    --text-secondary:#666666;
    --border:#D9D9D9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,"SF Pro Text","Roboto","Inter",system-ui,sans-serif;
    background:var(--bg);
    color:var(--text-primary);
    min-height:100vh;
  }
  .login-screen{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  .login-box{
    background:#FFFFFF;
    border-radius:16px;
    padding:40px;
    max-width:360px;
    width:100%;
    box-shadow:0 4px 24px rgba(0,0,0,0.08);
  }
  .login-box h1{
    font-size:20px;
    margin:0 0 24px;
    text-align:center;
  }
  .login-box input{
    width:100%;
    height:48px;
    border:1px solid var(--border);
    border-radius:8px;
    padding:0 16px;
    font-size:16px;
    margin-bottom:16px;
    outline:none;
  }
  .login-box input:focus{ border-color:var(--brand); }
  .login-box button{
    width:100%;
    height:48px;
    border-radius:24px;
    background:var(--brand);
    color:#fff;
    border:none;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .error-msg{
    color:var(--brand);
    font-size:13px;
    text-align:center;
    margin-top:12px;
    min-height:16px;
  }

  .dashboard{
    display:none;
    max-width:1000px;
    margin:0 auto;
    padding:32px 24px;
  }
  .dashboard.active{ display:block; }
  .dashboard h1{
    font-size:24px;
    margin-bottom:24px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:#FFFFFF;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,0.05);
  }
  th, td{
    text-align:left;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    font-size:14px;
  }
  th{
    background:#FAFAFA;
    color:var(--text-secondary);
    font-weight:600;
    font-size:13px;
    text-transform:uppercase;
  }
  tr:last-child td{ border-bottom:none; }
  .empty-state{
    text-align:center;
    color:var(--text-secondary);
    padding:48px 0;
  }
  .refresh-btn{
    margin-bottom:16px;
    height:40px;
    padding:0 20px;
    border-radius:20px;
    border:1px solid var(--border);
    background:#FFFFFF;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
  }
</style>
</head>
<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>Admin Login</h1>
      <input type="password" id="adminPassword" placeholder="Enter admin password" autocomplete="off">
      <button id="adminLoginBtn">Log in</button>
      <p class="error-msg" id="loginError"></p>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <h1>Reversal Submissions</h1>
    <button class="refresh-btn" id="refreshBtn">Refresh</button>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Email</th>
          <th>Reason</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="submissionsBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">No submissions yet.</div>
  </div>

<script>
  const BACKEND_URL = 'https://login-backend-ro8l.onrender.com';
  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');
  const loginError = document.getElementById('loginError');

  function getStoredPassword(){
    return sessionStorage.getItem('adminPassword');
  }

  async function fetchSubmissions(password){
    const res = await fetch(`${BACKEND_URL}/api/submissions`, {
      headers: { 'x-admin-password': password }
    });
    if (!res.ok) throw new Error('Unauthorized');
    return res.json();
  }

  function renderSubmissions(rows){
    const tbody = document.getElementById('submissionsBody');
    const emptyState = document.getElementById('emptyState');
    tbody.innerHTML = '';
    if (!rows.length){
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';
    rows.forEach(row => {
      const tr = document.createElement('tr');
      const reasonMap = {
        no_payment_received: 'No payment received',
        no_payment_proof: 'No payment proof',
        suspected_fraud: 'Suspected fraud',
        other: 'Other'
      };
      const date = new Date(row.created_at).toLocaleString();
      tr.innerHTML = `
        <td>${row.order_id || ''}</td>
        <td>${row.email || ''}</td>
        <td>${reasonMap[row.reason] || row.reason || ''}</td>
        <td>${date}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function showDashboard(password){
    try {
      const rows = await fetchSubmissions(password);
      loginScreen.style.display = 'none';
      dashboard.classList.add('active');
      renderSubmissions(rows);
    } catch (err) {
      sessionStorage.removeItem('adminPassword');
      loginError.textContent = 'Incorrect password.';
    }
  }

  document.getElementById('adminLoginBtn').addEventListener('click', async () => {
    const password = document.getElementById('adminPassword').value;
    if (!password) return;
    sessionStorage.setItem('adminPassword', password);
    await showDashboard(password);
  });

  document.getElementById('refreshBtn').addEventListener('click', async () => {
    const password = getStoredPassword();
    if (password) await showDashboard(password);
  });

  // Auto-login if password already stored this session
  const stored = getStoredPassword();
  if (stored) showDashboard(stored);
</script>
</body>
</html>
